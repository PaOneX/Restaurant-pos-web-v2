<!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1><i class="fas fa-utensils"></i> My Restaurant</h1>
            <div class="header-right">
                
                <button class="btn btn-login" onclick="Controller.showLogin()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn btn-logout" onclick="Controller.logoutUser()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
        <button class="nav-link" onclick="Controller.showPage('pos')" data-role="admin,cashier">
            <i class="fas fa-cash-register"></i>
            <span>POS / Billing</span>
        </button>
        <button class="nav-link active" onclick="Controller.showPage('products')" data-role="admin">
            <i class="fas fa-box"></i>
            <span>Products</span>
        </button>
        <button class="nav-link" onclick="Controller.showPage('orders')" data-role="admin">
            <i class="fas fa-receipt"></i>
            <span>Orders</span>
        </button>
        <button class="nav-link" onclick="Controller.showPage('history')" data-role="admin">
            <i class="fas fa-chart-line"></i>
            <span>Sales History</span>
        </button>
        <button class="nav-link" onclick="Controller.showPage('settings')" data-role="admin">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </button>
    </nav><!-- PRODUCTS MANAGEMENT PAGE -->
<h2><i class="fas fa-box"></i> Product Management</h2>

<!-- Product Form -->
<div class="card">
    <h3>Add / Edit Product</h3>
    <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-row">
            <div class="form-group">
                <label for="productName">Product Name *</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label for="productMainCategory">Main Category *</label>
                <select id="productMainCategory" required onchange="Controller.updateSubCategoryDropdown()">
                    <option value="">Select Main Category</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="productSubCategory">Sub Category *</label>
                <select id="productSubCategory" required>
                    <option value="">Select Sub Category</option>
                </select>
            </div>
            <div class="form-group">
                <label for="productPrice">Price (Rs.) *</label>
                <input type="number" id="productPrice" step="0.01" min="0" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="productStock">Stock Quantity</label>
                <input type="number" id="productStock" min="0" value="0">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Add Product
            </button>
            <button type="button" class="btn btn-secondary" onclick="Controller.clearProductForm()">
                <i class="fas fa-times"></i> Clear
            </button>
        </div>
    </form>
</div>

<!-- Products Table -->
<div class="card">
    <div class="table-header">
        <h3>Products List</h3>
        <div class="table-filters">
            <input type="text" id="searchProduct" placeholder="Search..." oninput="Controller.filterProducts()">
            <select id="mainCategoryFilter" onchange="Controller.filterByMainCategory()">
                <option value="All">All Main Categories</option>
            </select>
            <select id="subCategoryFilter" onchange="Controller.filterBySubCategory()">
                <option value="All">All Sub Categories</option>
            </select>
        </div>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Main Category</th>
                    <th>Sub Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productsTableBody">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>
</div>
